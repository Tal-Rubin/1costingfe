# Default engineering parameters for IFE heavy ion beam fusion
q_eng: 4.0               # Engineering gain target (P_et / P_recirc)

f_rep: 5.0               # Repetition rate [Hz]
pulsed_conversion: thermal
f_rad: 0.10
eta_pin: 0.25            # Accelerator wall-plug efficiency
eta_dec: 0.85           # Inductive DEC efficiency (used when pulsed_conversion: inductive_dec)
f_pdv: 0.80            # PdV work fraction (used when pulsed_conversion: inductive_dec)
mn: 1.1              # Neutron energy multiplier
f_sub: 0.03          # Subsystem power fraction
p_pump: 1.0          # Pumping power [MW]
p_trit: 10.0         # Tritium processing power [MW]
p_house: 4.0         # Housekeeping power [MW]
p_cryo: 0.5          # Cryogenic power [MW]
p_target: 0.8        # Target factory power [MW]

# Radial build geometry [m] (spherical chamber)
R0: 0.0          # Not used for sphere
plasma_t: 4.0        # Chamber radius
blanket_t: 0.80      # Blanket thickness
ht_shield_t: 0.25    # High-temperature shield
structure_t: 0.15    # Primary structure
vessel_t: 0.10       # Vacuum vessel

# Construction
construction_time_yr: 6.0  # Years (large accelerator complex)

# Fuel burn fraction defaults (physics.py ash_neutron_split)
dd_f_T: 0.969
dd_f_He3: 0.689
dhe3_dd_frac: 0.131
dhe3_f_T: 0.5
dhe3_f_He3: 0.1
pb11_f_alpha_n: 0.0
pb11_f_p_n: 0.0
