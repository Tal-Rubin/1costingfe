# All values from pyFECONs CostingConstants defaults

# CAS10 (bureaucracy: licensing, permits, studies)
site_permits: 3.0           # M$
plant_studies_foak: 20.0    # M$
plant_studies_noak: 4.0     # M$
plant_permits: 2.0          # M$
plant_reports: 1.0          # M$
other_precon: 1.0           # M$
land_intensity: 0.25        # acres per MWe (CFS ARC: 100 acres / 400 MWe)
land_cost: 10000.0          # $/acre (industrial-zoned US average)
licensing_cost_dt: 5.0      # M$
licensing_cost_dd: 3.0
licensing_cost_dhe3: 1.0
licensing_cost_pb11: 0.1
licensing_time_dt: 2.0      # years — Part 30, 1-2yr range (DI-015)
licensing_time_dd: 1.5      # 6-18 months (DI-015)
licensing_time_dhe3: 0.75   # 6-12 months (DI-016)
licensing_time_pb11: 0.0    # no NRC jurisdiction (DI-016)

# CAS22 — Reactor Plant Equipment
# Source: pyFECONs costing/calculations/cas22/, calibrated to volume-based
# 220101: First Wall + Blanket — volume-based unit costs (M$/m³)
# Calibrated against reference tokamak (R=6.2m, a=2.0m, κ=1.7)
blanket_unit_cost_dt: 0.60   # Full breeding blanket (TBR>1.05)
blanket_unit_cost_dd: 0.30   # Energy capture, no breeding
blanket_unit_cost_dhe3: 0.08 # Minimal X-ray + ~5% neutron
blanket_unit_cost_pb11: 0.05 # Minimal X-ray only

# 220102: Shield — volume-based unit cost (M$/m³)
shield_unit_cost: 0.74       # DT reference, apply fuel scale factor

# 220103-220108: Reactor components
structure_unit_cost: 0.15    # M$/m³ (volume-based)
vessel_unit_cost: 0.72       # M$/m³ (volume-based)
power_supplies_base: 80.0    # M$ at 1 GWe (power-scaled)
divertor_base: 60.0          # M$ at 1 GWth (power-scaled)
target_factory_base: 244.0   # M$ at 1 GWe ref (IFE/MIF target factory capital)

# C220109: DEC add-on for linear devices (M$ at 400 MWe DEC electric output)
# Source: docs/account_justification/CAS220109_direct_energy_converter.md
dec_base: 100.0              # Total DEC add-on cost at P_DEE_REF
dec_grid_cost: 12.0          # Replaceable grid/collector modules at P_DEE_REF

# DEC grid lifetime (FPY) — HIGH UNCERTAINTY, no reactor-scale data.
# Conservative estimates. Sensitivity range: 0.5x to 3x.
dec_grid_lifetime_dt: 2.0    # Sputtering + 14.1 MeV neutron damage
dec_grid_lifetime_dd: 3.0    # Sputtering + 2.45 MeV neutron damage
dec_grid_lifetime_dhe3: 4.0  # 14.7 MeV proton sputtering + He blistering
dec_grid_lifetime_pb11: 3.0  # 2.9 MeV alpha sputtering + severe He blistering

# 220110: Remote Handling & Maintenance Equipment (M$ at 1 GWe reference, tokamak)
# See docs/account_justification/CAS220110_remote_handling.md
# DT: Full RH suite (in-vessel transporter, divertor handler, cask transfer,
#   hot cell robotics, in-pipe welding, rad-hardened actuators).
# DD: Same scope, reduced rad-hardening tier (2.45 MeV vs 14.1 MeV).
# DHe3: Still needs RH (activation exceeds occupational limits), lighter duty.
# pB11: No rad-hardened robotics. Conventional maintenance equipment
#   (cranes, platforms, vessel access tooling). Cost is non-trivial due to
#   vacuum vessel access constraints, heavy components, confined-space work.
# Base costs calibrated to toroidal (tokamak/stellarator) geometry;
# linear concepts (mirror, FRC) apply concept_rh_scale < 1.0.
remote_handling_dt_base: 150.0
remote_handling_dd_base: 100.0
remote_handling_dhe3_base: 30.0
remote_handling_pb11_base: 20.0

# 220111: Installation labor
installation_frac: 0.14      # Fraction of reactor subtotal

# Core component lifetime (FPY — full power years between replacements)
# Source: 20260208-fusion-reactor-subsystems-by-fuel-type.md
core_lifetime_dt: 5.0     # 5-10 FPY, ~20 dpa/yr
core_lifetime_dd: 10.0    # 10-15 FPY, ~7 dpa/yr
core_lifetime_dhe3: 30.0  # 30+ FPY, ~1 dpa/yr
core_lifetime_pb11: 50.0  # 50+ FPY, ~0.1 dpa/yr

# CAS22 sub-accounts that need periodic replacement
# Default: blanket/FW + divertor. Extend to "C220103" for thin-shield designs.
replaceable_accounts:
  - C220101
  - C220108

# 220500: Fuel Handling (M$ at 1 GWe reference)
fuel_handling_dt_base: 120.0   # Full tritium processing + containment
fuel_handling_dd_base: 60.0    # Small-scale tritium + deuterium
fuel_handling_dhe3_base: 40.0  # He-3 handling
fuel_handling_pb11_base: 15.0  # Boron powder injection

# CAS21 building costs — M$ at 1 GWe reference (~1.15 GW gross), per fuel type
# From-scratch derivation: industrial benchmarks + fuel-specific scoping.
# See docs/account_justification/CAS21_buildings.md
# Each building has its own scaling basis (see "scales" key).
# Totals: DT=$502/kW, DD=$446/kW, DHe3=$339/kW, pB11=$308/kW
building_costs:
  # --- Fuel-dependent, ~fixed (site footprint) ---
  site_improvements:  {dt: 85, dd: 81, dhe3: 75, pb11: 69, scales: fixed}
  # --- Fuel-dependent, scales with P_fus ---
  reactor_building:   {dt: 138, dd: 127, dhe3: 98, pb11: 81, scales: p_fus}
  hot_cell:           {dt: 104, dd: 78,  dhe3: 23, pb11: 0,  scales: p_fus}
  reactor_auxiliaries: {dt: 29, dd: 25,  dhe3: 21, pb11: 17, scales: p_fus}
  # --- Fuel-dependent, ~fixed ---
  fuel_storage:       {dt: 9,   dd: 7,   dhe3: 3,  pb11: 1,  scales: fixed}
  control_room:       {dt: 14,  dd: 13,  dhe3: 12, pb11: 12, scales: fixed}
  security:           {dt: 3.5, dd: 3.5, dhe3: 2.3, pb11: 2.3, scales: fixed}
  ventilation_hvac:   {dt: 17,  dd: 15,  dhe3: 6,  pb11: 3.5, scales: floor_area}
  administration:     {dt: 9,   dd: 8,   dhe3: 6,  pb11: 5,  scales: staff}
  maintenance:        {dt: 17,  dd: 16,  dhe3: 15, pb11: 14, scales: fixed}
  site_services:      {dt: 5,   dd: 5,   dhe3: 3.5, pb11: 3.5, scales: fixed}
  # --- Fuel-independent ---
  turbine_building:   {all: 58, scales: p_the}
  heat_exchanger:     {all: 17, scales: p_th}
  power_supply:       {all: 17, scales: p_et}
  onsite_ac:          {all: 12, scales: p_et}
  cryogenics:         {all: 14, scales: fixed}
  service_water:      {all: 9,  scales: p_th}
  assembly_hall:      {all: 21, scales: fixed}

# CAS27 — Special materials: initial reactor material inventory (M$ at 1 GWe)
# Default assumes PbLi blanket concept for DT. For HCPB concepts with
# beryllium neutron multiplier, override CAS27 to ~$200M.
# See docs/account_justification/CAS27_special_materials.md
special_materials_dt: 15.0    # PbLi fill (~4,500t @ $3/kg) + enriched Li
special_materials_dd: 2.0     # Conventional coolant fills only
special_materials_dhe3: 1.0   # Minimal special materials
special_materials_pb11: 0.0   # No special materials

# CAS23-26 — BOP equipment (M$/MW gross electric, 2024$)
# turbine_per_mw and heat_rej_per_mw are now set by PowerCycle preset
# in POWER_CYCLE_DEFAULTS (see defaults.py). CAS24/25 remain here:
# Source: ARIES/NETL calibration (2019$ × 1.22 CPI inflation)
# See docs/account_justification/CAS23_26_balance_of_plant.md
inflation_2019_2024: 1.22
electric_per_mw: 0.08418    # 0.069 * 1.22 — switchyard, transformers, cabling
misc_per_mw: 0.05124        # 0.042 * 1.22 — fire protection, compressed air, HVAC

# CAS28 — Digital twin (M$, fixed)
# Source: NtTau Digital LTD in-house estimate (pyFECONS)
# See docs/account_justification/CAS28_digital_twin.md
digital_twin: 5.0

# CAS29 — Contingency on direct costs
# Source: Gen-IV EMWG convention, pyFECONS
# See docs/account_justification/CAS29_contingency.md
contingency_rate_foak: 0.10
contingency_rate_noak: 0.0

# CAS30
indirect_fraction: 0.20           # fraction of CAS20 (total direct cost)
reference_construction_time: 6.0  # years (scaling baseline)

# CAS40 — Capitalized owner's costs (M$ at 1 GWe reference, 2023$)
# Source: CAS40_capitalized_owners_costs.md — INL methodology on CAS71-73 staffing
# Power-law scaling: CAS40 = owner_cost(fuel) * (P_net / 1 GWe)^0.5
owner_cost_dt: 39.0        # 117 staff, full neutron + tritium pre-op training
owner_cost_dd: 31.0        # 94 staff, reduced tritium scope
owner_cost_dhe3: 23.0      # 69 staff, light HP program
owner_cost_pb11: 20.0      # 59 staff, near-industrial, RSO-only

# CAS50 — Capitalized supplementary costs
# Source: CAS50_supplementary_costs.md — sub-account model
shipping_frac: 0.015              # fraction of CAS20
spare_parts_frac_dt: 0.03         # fraction of CAS22-28, activated component spares
spare_parts_frac_dd: 0.025
spare_parts_frac_dhe3: 0.015
spare_parts_frac_pb11: 0.01       # conventional industrial spares only
tax_frac: 0.01                    # fraction of CAS20, after exemptions
construction_insurance_frac: 0.015  # fraction of (CAS20+CAS30), builder's risk
startup_fuel_dt: 40.0             # M$ at 1 GWe — tritium startup inventory
startup_fuel_dd: 0.1              # M$ at 1 GWe — deuterium
startup_fuel_dhe3: 10.0           # M$ at 1 GWe — He3
startup_fuel_pb11: 0.1            # M$ at 1 GWe — H + B11
decom_provision_dt: 127.0         # M$ at 1 GWe — PV of $410M over 40yr at 3%
decom_provision_dd: 93.0          # M$ at 1 GWe — PV of $300M
decom_provision_dhe3: 65.0        # M$ at 1 GWe — PV of $210M
decom_provision_pb11: 53.0        # M$ at 1 GWe — PV of $170M

# CAS70 — Annual O&M cost (M$/yr at 1 GWe reference, 2023$)
# Source: CAS70_staffing_and_om_costs.md — staffing-based build-up by fuel type
# Power-law scaling: annual_om = om_cost(fuel) * (P_net / 1 GWe)^0.5
om_cost_dt: 52.0       # Full neutron + tritium operational overhead
om_cost_dd: 39.0       # ~1/3 DT neutron flux, smaller tritium inventory
om_cost_dhe3: 26.0     # ~5% neutron fraction, minimal tritium
om_cost_pb11: 24.0     # Aneutronic, no tritium, RSO-only

# CAS80 fuel isotope unit costs ($/kg)
# u_deuterium: STARFIRE (1980) inflation-adjusted via GDP IPD ratio.
# Current range: $1,500-3,500/kg (see 20260211-fusion-fuel-isotope-sourcing.md).
# Fuel cost is <1% of DT LCOE. Parameter ranges for optimism/learning
# sweeps are a future concern — will need a separate range config for all params.
u_deuterium: 2175.0          # $/kg
u_li6: 1000.0                # $/kg, enriched Li-6 (90%) for breeding blanket
u_he3: 2000000.0             # $/kg, He-3 ($2,000/g — optimistic self-production)
u_protium: 5.0               # $/kg, commodity H2
u_b11: 10000.0               # $/kg, FOAK enriched B-11 (no industrial supply)
u_b11_noak: 75.0             # $/kg, NOAK B-11 (industrial chemical exchange distillation)

# CAS80 — fuel utilization
burn_fraction: 0.05          # Fraction of injected fuel that undergoes fusion per pass
fuel_recovery: 0.95          # Fraction of unburned fuel recovered and recycled

# Pulsed inductive DEC — driver cost basis
c_cap_allin_per_joule: 2.0   # $/J_stored, NOAK all-in (caps+switches+charging+buswork)
                              # Sensitivity range: 1.5-4.0

# Pulsed inductive DEC — C220109 incremental markups
markup_switch_bidir: 0.06    # Bidirectional switch premium (frac of driver cost)
markup_controls: 0.04        # FPGA/energy management upgrade (frac of driver cost)
c_inv_per_kw_net: 150.0      # Grid-tie inverter ($/kW_net)

# Pulsed inductive DEC — CAS72 cap replacement
cap_shot_lifetime: 1.0e+8    # Shots, NOAK baseline. Sensitivity: 1e7-1e9

# Pulsed radiation fraction defaults (frac of charged-particle energy)
f_rad_dt: 0.10
f_rad_dd: 0.08
f_rad_dhe3: 0.05
f_rad_pb11: 0.15             # High Z^2 bremsstrahlung

# PdV work fraction for inductive DEC expansion stroke
# For adiabatic expansion: f_pdv = 1 - (1/r)^(gamma-1), gamma=5/3
# r=10 -> 0.78, r=20 -> 0.86, r=50 -> 0.91
f_pdv: 0.80
